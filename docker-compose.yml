version: "3.9"

services:
  app:
    build:
      context: .
      target: production
    container_name: invoice_app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://invoice_user:invoice_pass@postgres:5432/invoice_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - invoice_data:/data/invoices
      - screenshots_data:/data/screenshots
      - logs_data:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    restart: unless-stopped
    networks:
      - invoice_net

  worker:
    build:
      context: .
      target: production
    container_name: invoice_worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://invoice_user:invoice_pass@postgres:5432/invoice_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - invoice_data:/data/invoices
      - screenshots_data:/data/screenshots
      - logs_data:/app/logs
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info -Q high,default,low --concurrency=4
    restart: unless-stopped
    networks:
      - invoice_net

  beat:
    build:
      context: .
      target: production
    container_name: invoice_beat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://invoice_user:invoice_pass@postgres:5432/invoice_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    restart: unless-stopped
    networks:
      - invoice_net

  flower:
    build:
      context: .
      target: production
    container_name: invoice_flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app.celery_app flower --port=5555 --broker=redis://redis:6379/0
    restart: unless-stopped
    networks:
      - invoice_net

  redis:
    image: redis:7.2-alpine
    container_name: invoice_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - invoice_net

  postgres:
    image: postgres:16-alpine
    container_name: invoice_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: invoice_db
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - invoice_net

volumes:
  postgres_data:
    name: invoice_postgres_data
  redis_data:
    name: invoice_redis_data
  invoice_data:
    name: invoice_files_data
  screenshots_data:
    name: invoice_screenshots_data
  logs_data:
    name: invoice_logs_data

networks:
  invoice_net:
    name: invoice_network
    driver: bridge
